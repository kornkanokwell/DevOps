name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: movie-booking/backend
        run: pip install -r requirements.txt

      - name: Check syntax (lint)
        working-directory: movie-booking/backend
        run: python -m py_compile app/main.py app/routers/bookings.py app/services/booking.py

  deploy-check:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        run: test -f movie-booking/backend/Dockerfile && echo "Dockerfile found"

      - name: Verify start.sh exists
        run: test -f movie-booking/backend/start.sh && echo "start.sh found"