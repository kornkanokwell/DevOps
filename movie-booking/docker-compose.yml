services:
  db:
    image: postgres:16-alpine
    container_name: movie_booking_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: movie_user
      POSTGRES_PASSWORD: movie_pass
      POSTGRES_DB: movie_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie_user -d movie_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: